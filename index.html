<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP</title>
    <link rel="stylesheet" href="./output.css">
    <link rel="icon"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTu8vVehgg2YbIu7pOUYCw3DeSSVjREPdJ4lXQb5lC4Ow&s=10">
</head>

<body class="min-h-screen bg-linear-to-br from-blue-400 via-sky-300 to-cyan-200 flex justify-center items-center p-4">

    <div class="w-full max-w-md bg-white/40 backdrop-blur-lg shadow-2xl rounded-2xl p-6 border border-white/40">

        <h1 class="text-3xl font-bold text-center drop-shadow-md mb-6">
            🌤️Weather Application
        </h1>

        <div class="flex flex-col gap-4">
            <input type="text" placeholder="Enter City" id="city-name"
                class="w-full px-4 py-3 rounded-xl outline-none border-2 border-white/60 text-gray-800 placeholder:gray-400 focus:ring-2 focus:ring-blue-500">

            <button
                class="bg-blue-600 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition-all duration-500"
                id="search">
                Search Weather Details
            </button>
        </div>


        <div id="result" class="mt-6 hidden bg-white/40 rounded-2xl p-5">

        </div>

    </div>


    <script src="./weather.js"></script>
</body>

</html>
